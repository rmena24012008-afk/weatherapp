<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href='https://fonts.googleapis.com/css?family=Public Sans' rel='stylesheet'>
    <style>
        body {
            margin: 0px;
            padding: 0px;
            background-color: #02012B;
            color: white;
            font-family: 'Public Sans';
        }

        input {
            background-color: #25253F;
            color: white;
            border: none;
            width: 450px;
            height: 50px;
            border-radius: 10px;
            padding-left: 20px;
            margin-left: 37%;
            font-size: 1.1em;
        }

        h1 {
            margin-left: 30%;
            font-size: 4.3em;
            margin-top: 6%;
        }

        #submit {
            width: 100px;
            height: 50px;
            background-color: #4253D5;
            margin-left: 20px;
            border: none;
            color: white;
            font-family: 'Public Sans';
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.3em;
        }

        #container {
            width: 50%;
            height: 500px;
            background-color: #3A3ABC;
            margin-left: 25%;
            margin-top: 5%;
            border-radius: 20px;
            overflow: hidden;

        }

        #city_name {
            font-size: 2.3em;
            margin-left: 2%;
            padding-top: 2%;
            width: 50%;
        }

        #temp {
            margin-left: 70%;
            font-size: 3.9em;
            margin-top: -10%;
        }

        #time {
            margin-left: 5%;
            font-size: 1.6em;
            /* margin-top: -5%; */
        }

        #cloud {
            margin-left: 46.2%;
            margin-top: -10.9%;
            position: absolute;
            border-bottom-right-radius: 20px;
            width: 550px;
        }

        #top-cloud {
            height: 150px;
            rotate: 180deg;
        }

        #humidity {
            margin-top: -5%;
            font-size: 2.3em;
            margin-left: 2%;
        }
    </style>
</head>

<body>
    <!-- <img src="Screenshot from 2025-11-23 17-24-34.png"> -->
    <h1>How's the sky looking today?</h1>
    <input type="text" placeholder="search for a place..." id =city>
    <button id="submit" onclick="weather(1)">Search</button>
    <div id="container">
        <img src="Screenshot_from_2025-11-23_21-25-58-removebg-preview.png" id="top-cloud">

        <p id="city_name"> </p>
        <p id="temp"></p>
        <p id="humidity"></p>
        <p id="time"></p>

    </div>
    <img src="Screenshot_from_2025-11-23_21-25-58-removebg-preview.png" id="cloud">
    <script src="weather.js"></script>
</body>

</html>
