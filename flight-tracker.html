<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href='https://fonts.googleapis.com/css?family=Public Sans' rel='stylesheet'>
    <style>
        body{
            margin: 0px;
            padding: 0px;
            background-color: #02012B;
            color: white;
            font-family: 'Public Sans';
        }
        input{
            background-color: #25253F;
            color: white;
            border: none;
            width: 450px;
            height: 50px;
            border-radius: 10px;
            padding-left:20px ;
            margin-left: 37%;
            font-size: 1.1em;
        }
        h1{
            margin-left: 42%;
            font-size: 4.3em;
            margin-top: 6%;
        }
        .submit{
            width: 105px;
            height: 50px;
            background-color: #4253D5;
            margin-left: 20px;
            border: none;
            color: white;
            font-family: 'Public Sans';
            border-radius: 10px;
            font-size: 1.3em;
            cursor: pointer;
        }
        #container{
            width: 50%;
            height: auto;
            background-color: #02012B;
            margin-left: 25%;
            margin-top: 5%;
            border-radius: 20px;
            overflow: hidden;

        }
        .flight{
            width: 80%;
            height: 300px;
            background-color: #3A3ABC;
            border-radius: 20px;
            margin: auto;
        }
        .productName{
            margin-left: 3%;
            font-size: 1.3em;
            padding-top: 2%;
        }
        .status{
            background-color:#02012B;
            color: white;
            border: none;
            padding: 20px;
            margin-left: 31%;
            position: absolute;
            margin-top: -12%;
            border-radius: 20px;
            font-size: 1.3em;
        }
        #loading{
            font-size: 1.3em;
            color:white;
        }
    </style>
</head>
<body>
    <h1>Flight Tracker</h1>
    <input type="text" placeholder="search for a flight no..." id ="id">
    <button class="submit" onclick="flightTracker()">Search</button>
    <button class="submit" onclick="allflightTracker()">All Flight</button>
    <!-- <h1 id="loading"></h1> -->

    <div id="container">
    </div>
    <script src="flight-tracker.js"></script>
</body>
</html>
